<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdi Putrana Radian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .logo-path {
            stroke-width: 2;
            stroke-linejoin: miter;
            stroke-linecap: square;
        }
        #visit-btn {
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="logo-container" class="flex items-center justify-center">
        <svg
            id="main-svg"
            viewBox="0 0 112 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            style="overflow: visible;"
            class="h-12 w-auto md:h-20"
        >
            <g class="group-1"></g>
            <g class="group-2"></g>
        </svg>
    </div>

    <div class="mt-12">
        <a href="https://abdi.cc" id="visit-btn" class="px-8 py-3 bg-[#355ddd] text-white font-semibold rounded-full active:scale-95 transition-all duration-300">
            Visit Website
        </a>
    </div>

    <script>
        const PATH_DATA = [
            { d: "M 24 24 L 1 24 L 24 1 Z" },
            { d: "M 34 0 L 52 0 A 6 6 0 0 1 52 12 A 6 6 0 0 1 52 24 L 34 24 L 34 0 Z" },
            { d: "M 68 0 L 80 0 A 12 12 0 0 1 80 24 L 68 24 L 68 0 Z" },
            { d: "M 102 0 L 112 0 L 112 24 L 102 24 Z" }
        ];

        // Render Path ke dalam SVG
        const g1 = document.querySelector('.group-1');
        const g2 = document.querySelector('.group-2');

        const createPaths = (group, prefix) => {
            PATH_DATA.forEach((p, i) => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", p.d);
                path.setAttribute("stroke", "white");
                path.setAttribute("fill", "white");
                path.classList.add("logo-path", `${prefix}-${i}`);
                group.appendChild(path);
            });
        };

        createPaths(g1, "p1");
        createPaths(g2, "p2");

        // Logic Animasi
        const allPaths = document.querySelectorAll(".logo-path");
        let firstCycleDone = false;

        // Setup awal
        allPaths.forEach((path) => {
            const length = path.getTotalLength();
            gsap.set(path, {
                strokeDasharray: length,
                strokeDashoffset: length,
                fillOpacity: 0,
                autoAlpha: 0,
            });
        });

        const playCycle = (currentClass, nextClass) => {
            const targets = document.querySelectorAll(currentClass);
            const tl = gsap.timeline({
                defaults: { ease: "power2.inOut" },
                onComplete: () => {
                    gsap.set(targets, {
                        strokeDashoffset: (i, target) => target.getTotalLength(),
                        autoAlpha: 0,
                        fillOpacity: 0,
                    });
                },
            });

            tl.set(targets, { autoAlpha: 1 });

            // DRAW IN
            tl.to(targets, {
                strokeDashoffset: 0,
                duration: 1.4,
                stagger: 0.2,
            })
            // FILL IN
            .to(targets, {
                fillOpacity: 1,
                duration: 0.6,
                stagger: 0.2,
                onComplete: () => {
                    // Munculkan tombol setelah fill pertama selesai
                    if (!firstCycleDone) {
                        gsap.to("#visit-btn", { autoAlpha: 1, y: -10, duration: 1, ease: "back.out(1.7)" });
                        firstCycleDone = true;
                    }
                }
            }, "<0.8")

            .to({}, { duration: 0.8 }) // HOLD

            .add("eraseStart")
            // ERASE LINE
            .to(targets, {
                strokeDashoffset: (i, target) => -target.getTotalLength(),
                duration: 1.8,
                stagger: 0.2,
                onStart: () => {
                    gsap.delayedCall(0.8, () => playCycle(nextClass, currentClass));
                },
            }, "eraseStart")
            // UNFILL
            .to(targets, {
                fillOpacity: 0,
                duration: 0.8,
                stagger: 0.2,
            }, "eraseStart");
        };

        // Start Animation
        window.addEventListener('load', () => {
            playCycle(".group-1 .logo-path", ".group-2 .logo-path");
        });
    </script>
</body>
</html>
